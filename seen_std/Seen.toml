[project]
name = "seen_std"
version = "0.1.0"
language = "en"
visibility = "explicit"
description = "Core Seen standard library modules used by the self-hosted compiler"
edition = "2025"
modules = [
    "src/core/intrinsics.seen",
    "src/core/option.seen",
    "src/core/result.seen",
    "src/core/prelude.seen",
    "src/collections/list_utils.seen",
    "src/collections/vec.seen",
    "src/collections/std_string.seen",
    "src/collections/string_hash_map.seen",
    "src/collections/string_buffer.seen",
    "src/io/file.seen",
    "src/env/env.seen",
    "src/fs/path.seen",
    "src/process/process.seen",
    "src/time/time.seen",
    "src/async/task.seen",
    "src/ffi/cinterop.seen",
    "src/str/string.seen",
    "src/math/math.seen"
]

[build]
targets = ["native"]
optimize = "speed"
profile = "release"

[dependencies]

[metadata]
visibility = "explicit"
license = "Apache-2.0"
